# CPU-only Docker Compose — for machines without NVIDIA GPU
#
# Usage:
#   docker compose -f docker-compose.cpu.yml up --build
#
# This is identical to docker-compose.yml but WITHOUT the GPU reservation
# that causes failures on CPU-only hosts.

services:
  backend:
    build:
      context: ./backend
      args:
        DEVICE_MODE: cpu
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Security hardening — uncomment & adjust for production
      # MEOWLLM_ENFORCE_HTTPS: "true"
      # MEOWLLM_ACCOUNT_LOCKOUT_ATTEMPTS: "5"
      # MEOWLLM_ACCOUNT_LOCKOUT_MINUTES: "15"
      # MEOWLLM_RATE_LIMIT_PASSWORD_RESET: "3/hour"
    volumes:
      - meowllm-data:/app/data
      - huggingface-cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # No GPU reservation — this is the CPU-only variant

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:80" ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  meowllm-data:
  huggingface-cache:
